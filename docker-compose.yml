services:
  postgres:
    image: postgres:16-alpine
    container_name: banhang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banhang
    ports:
      - "5432:5432"
    volumes:
      - banhang_pg_data:/var/lib/postgresql/data

volumes:
  banhang_pg_data:
