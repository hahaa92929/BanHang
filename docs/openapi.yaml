openapi: 3.0.3
info:
  title: BanHang Backend API
  version: 2.0.0
  description: Versioned NestJS backend API for auth, CRM, content, catalog, cart, orders, payments, inventory, shipping, notifications, reporting, and store locator flows.
servers:
  - url: http://localhost:4000/api/v1
tags:
  - name: Health
  - name: Auth
  - name: Account
  - name: CRM
  - name: Search
  - name: Content
  - name: Catalog
  - name: Cart
  - name: Compare
  - name: Orders
  - name: Payments
  - name: Inventory
  - name: Shipping
  - name: Stores
  - name: Notifications
  - name: Reporting
  - name: Wishlist
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /auth/guest:
    post:
      tags: [Auth]
      summary: Create a guest session for server-side cart and checkout
      responses:
        '200':
          description: Guest auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email, password, and optional OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/social/{provider}:
    post:
      tags: [Auth]
      summary: Social login or account linking with optional guest cart merge and referral tracking
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, facebook, apple, zalo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          description: Auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a customer account with optional guest cart merge and referral tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Auth payload with debug verification token outside production

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using body token or refresh cookie
      parameters:
        - in: header
          name: x-csrf-token
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed auth payload

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset requested

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified

  /auth/request-email-verification:
    post:
      tags: [Auth]
      summary: Request a new email verification token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification token requested

  /auth/2fa/enable:
    post:
      tags: [Auth]
      summary: Generate a TOTP secret and otpauth URL
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Two-factor setup payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupResponse'

  /auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code and activate two-factor authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTwoFactorRequest'
      responses:
        '200':
          description: Two-factor verification result

  /auth/api-keys:
    get:
      tags: [Auth]
      summary: List API keys for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeySummary'
    post:
      tags: [Auth]
      summary: Create an API key for integrations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'

  /auth/api-keys/{id}:
    delete:
      tags: [Auth]
      summary: Revoke an API key
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List refresh sessions for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a refresh session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session revoked

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke a refresh token or all current user sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logout success

  /account:
    delete:
      tags: [Account]
      summary: Delete and anonymize the current customer account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Account anonymized and personal side data removed

  /account/dashboard:
    get:
      tags: [Account]
      summary: Customer dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary

  /account/orders:
    get:
      tags: [Account]
      summary: List current customer orders with filter and search
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [created, confirmed, shipping, completed, canceled, returned]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Paged customer order list

  /account/orders/{id}/reorder:
    post:
      tags: [Account]
      summary: Re-add a previous order into the current cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reorder result with added and skipped items

  /account/loyalty:
    get:
      tags: [Account]
      summary: Loyalty summary and earning history derived from completed orders and referral rewards
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Loyalty points balance, tier, and history

  /account/loyalty/redeem:
    post:
      tags: [Account]
      summary: Redeem loyalty points into a single-use coupon voucher
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemLoyaltyRequest'
      responses:
        '200':
          description: Loyalty redemption result with created coupon

  /account/referral:
    get:
      tags: [Account]
      summary: Get current customer referral code, share link, and referral stats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral summary with signups and rewards

  /account/referral/regenerate:
    post:
      tags: [Account]
      summary: Rotate current customer referral code and return updated referral summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Referral summary with refreshed code

  /account/profile:
    get:
      tags: [Account]
      summary: Get current customer profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customer profile
    patch:
      tags: [Account]
      summary: Update current customer profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Customer profile updated

  /account/addresses:
    get:
      tags: [Account]
      summary: List address book
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Address book
    post:
      tags: [Account]
      summary: Create address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountAddressRequest'
      responses:
        '200':
          description: Address book updated

  /account/addresses/{id}:
    patch:
      tags: [Account]
      summary: Update address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountAddressRequest'
      responses:
        '200':
          description: Address book updated
    delete:
      tags: [Account]
      summary: Delete address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address book updated

  /account/addresses/{id}/default:
    post:
      tags: [Account]
      summary: Set default address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address book updated

  /account/export:
    get:
      tags: [Account]
      summary: Export current customer data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customer data export

  /crm/customers:
    get:
      tags: [CRM]
      summary: List CRM customers with segments, tags, and lifetime metrics
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: segment
          schema:
            type: string
            enum: [vip, new, at_risk, inactive, active]
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [customer, guest]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated CRM customer list

  /crm/customers/export:
    get:
      tags: [CRM]
      summary: Export CRM customer dataset for admin workflows
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: segment
          schema:
            type: string
            enum: [vip, new, at_risk, inactive, active]
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [customer, guest]
      responses:
        '200':
          description: Customer export payload

  /crm/customers/{id}:
    get:
      tags: [CRM]
      summary: Get CRM customer detail with notes, tags, orders, and wishlist preview
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CRM customer detail

  /crm/customers/{id}/notes:
    post:
      tags: [CRM]
      summary: Add an internal CRM note to a customer
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerNoteRequest'
      responses:
        '201':
          description: CRM note created

  /crm/customers/{id}/notes/{noteId}:
    delete:
      tags: [CRM]
      summary: Delete an internal CRM note
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: noteId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CRM note deleted

  /crm/customers/{id}/tags:
    post:
      tags: [CRM]
      summary: Attach a CRM tag to a customer
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerTagRequest'
      responses:
        '201':
          description: CRM tag attached

  /crm/customers/{id}/tags/{tagId}:
    delete:
      tags: [CRM]
      summary: Remove a CRM tag from a customer
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: tagId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CRM tag removed

  /search:
    get:
      tags: [Search]
      summary: Full-text product search with facets and typo suggestion
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: integer
        - in: query
          name: maxPrice
          schema:
            type: integer
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: sort
          schema:
            type: string
            enum: [relevance, newest, price_asc, price_desc, rating_desc]
        - in: query
          name: source
          schema:
            type: string
      responses:
        '200':
          description: Search result page with facets and suggestion

  /search/suggestions:
    get:
      tags: [Search]
      summary: Autocomplete suggestions for products, brands, categories, and queries
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Search suggestions

  /search/trending:
    get:
      tags: [Search]
      summary: Trending search keywords with optional fallback to best-selling products
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 90
      responses:
        '200':
          description: Trending search analytics

  /search/recent:
    get:
      tags: [Search]
      summary: List recent searches for the current customer
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Recent search history
    delete:
      tags: [Search]
      summary: Clear recent search history for the current customer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Search history cleared

  /search/analytics:
    get:
      tags: [Search]
      summary: Aggregated search analytics for reporting and zero-result monitoring
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 90
        - in: query
          name: zeroOnly
          schema:
            type: boolean
      responses:
        '200':
          description: Search analytics summary

  /products:
    get:
      tags: [Catalog]
      summary: List active products with filters
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [price_asc, price_desc, rating_desc, newest, featured]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Product list
    post:
      tags: [Catalog]
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /products/export:
    get:
      tags: [Catalog]
      summary: Export products for admin workflows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Export payload

  /products/import:
    post:
      tags: [Catalog]
      summary: Bulk import products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportProductsRequest'
      responses:
        '200':
          description: Import result

  /products/categories:
    get:
      tags: [Catalog]
      summary: List category tree
      responses:
        '200':
          description: Category tree
    post:
      tags: [Catalog]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created

  /products/brands:
    get:
      tags: [Catalog]
      summary: List active brands
      responses:
        '200':
          description: Brand list
    post:
      tags: [Catalog]
      summary: Create brand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created

  /products/{productRef}:
    get:
      tags: [Catalog]
      summary: Get product by id or slug
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Catalog]
      summary: Update product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Catalog]
      summary: Archive product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product archived

  /products/{productRef}/media:
    post:
      tags: [Catalog]
      summary: Add media to a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductMediaRequest'
      responses:
        '201':
          description: Media created

  /products/{productRef}/reviews:
    get:
      tags: [Catalog]
      summary: List published reviews for a product
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, helpful, rating_desc]
        - in: query
          name: verifiedOnly
          schema:
            type: boolean
        - in: query
          name: withMedia
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Review list
    post:
      tags: [Catalog]
      summary: Create a product review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created

  /products/{productRef}/reviews/moderation:
    get:
      tags: [Catalog]
      summary: List reviews for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, published, rejected]
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, helpful, rating_desc]
        - in: query
          name: verifiedOnly
          schema:
            type: boolean
        - in: query
          name: withMedia
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
