openapi: 3.0.3
info:
  title: BanHang Backend API
  version: 2.0.0
  description: Versioned NestJS backend API for auth, catalog, cart, orders, payments, inventory, shipping, notifications, and reporting.
servers:
  - url: http://localhost:4000/api/v1
tags:
  - name: Health
  - name: Auth
  - name: Catalog
  - name: Cart
  - name: Orders
  - name: Payments
  - name: Inventory
  - name: Shipping
  - name: Notifications
  - name: Reporting
  - name: Wishlist
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /auth/guest:
    post:
      tags: [Auth]
      summary: Create a guest session for server-side cart and checkout
      responses:
        '200':
          description: Guest auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email, password, and optional OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/social/{provider}:
    post:
      tags: [Auth]
      summary: Social login or account linking with optional guest cart merge
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, facebook, apple, zalo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          description: Auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a customer account with optional guest cart merge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Auth payload with debug verification token outside production

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using body token or refresh cookie
      parameters:
        - in: header
          name: x-csrf-token
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed auth payload

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset requested

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified

  /auth/request-email-verification:
    post:
      tags: [Auth]
      summary: Request a new email verification token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification token requested

  /auth/2fa/enable:
    post:
      tags: [Auth]
      summary: Generate a TOTP secret and otpauth URL
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Two-factor setup payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupResponse'

  /auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code and activate two-factor authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTwoFactorRequest'
      responses:
        '200':
          description: Two-factor verification result

  /auth/api-keys:
    get:
      tags: [Auth]
      summary: List API keys for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeySummary'
    post:
      tags: [Auth]
      summary: Create an API key for integrations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'

  /auth/api-keys/{id}:
    delete:
      tags: [Auth]
      summary: Revoke an API key
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List refresh sessions for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a refresh session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session revoked

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke a refresh token or all current user sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logout success

  /products:
    get:
      tags: [Catalog]
      summary: List active products with filters
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [price_asc, price_desc, rating_desc, newest, featured]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Product list
    post:
      tags: [Catalog]
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /products/export:
    get:
      tags: [Catalog]
      summary: Export products for admin workflows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Export payload

  /products/import:
    post:
      tags: [Catalog]
      summary: Bulk import products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportProductsRequest'
      responses:
        '200':
          description: Import result

  /products/categories:
    get:
      tags: [Catalog]
      summary: List category tree
      responses:
        '200':
          description: Category tree
    post:
      tags: [Catalog]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created

  /products/brands:
    get:
      tags: [Catalog]
      summary: List active brands
      responses:
        '200':
          description: Brand list
    post:
      tags: [Catalog]
      summary: Create brand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created

  /products/{productRef}:
    get:
      tags: [Catalog]
      summary: Get product by id or slug
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Catalog]
      summary: Update product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Catalog]
      summary: Archive product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product archived

  /products/{productRef}/media:
    post:
      tags: [Catalog]
      summary: Add media to a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductMediaRequest'
      responses:
        '201':
          description: Media created

  /products/{productRef}/reviews:
    get:
      tags: [Catalog]
      summary: List published reviews for a product
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, helpful, rating_desc]
        - in: query
          name: verifiedOnly
          schema:
            type: boolean
        - in: query
          name: withMedia
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Review list
    post:
      tags: [Catalog]
      summary: Create a product review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created

  /products/{productRef}/reviews/moderation:
    get:
      tags: [Catalog]
      summary: List reviews for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, published, rejected]
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, helpful, rating_desc]
        - in: query
          name: verifiedOnly
          schema:
            type: boolean
        - in: query
          name: withMedia
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Moderation queue

  /products/{productRef}/reviews/{reviewId}/helpful:
    post:
      tags: [Catalog]
      summary: Mark a published review as helpful
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Helpful vote registered

  /products/{productRef}/reviews/{reviewId}/reply:
    patch:
      tags: [Catalog]
      summary: Reply to a product review as admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyReviewRequest'
      responses:
        '200':
          description: Review reply saved

  /products/{productRef}/reviews/{reviewId}/status:
    patch:
      tags: [Catalog]
      summary: Update review moderation status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerateReviewRequest'
      responses:
        '200':
          description: Review status updated

  /cart:
    get:
      tags: [Cart]
      summary: Get current user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart summary

  /cart/items:
    post:
      tags: [Cart]
      summary: Add cart item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart

  /cart/items/{productId}:
    patch:
      tags: [Cart]
      summary: Set cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: variantId
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Updated cart
    delete:
      tags: [Cart]
      summary: Remove cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: variantId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Updated cart

  /cart/merge:
    post:
      tags: [Cart]
      summary: Merge anonymous cart items into current user cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeCartRequest'
      responses:
        '200':
          description: Updated cart

  /cart/coupon:
    post:
      tags: [Cart]
      summary: Apply coupon to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCouponRequest'
      responses:
        '200':
          description: Updated cart
    delete:
      tags: [Cart]
      summary: Remove coupon from cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated cart

  /cart/save-for-later/{productId}:
    post:
      tags: [Cart]
      summary: Move cart item to wishlist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
        - in: query
          name: variantId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Updated cart

  /cart/clear:
    delete:
      tags: [Cart]
      summary: Clear cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Empty cart

  /wishlist:
    get:
      tags: [Wishlist]
      summary: List current user wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wishlist data

  /wishlist/items:
    post:
      tags: [Wishlist]
      summary: Add a product to wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWishlistItemRequest'
      responses:
        '201':
          description: Wishlist updated

  /wishlist/items/{productId}:
    delete:
      tags: [Wishlist]
      summary: Remove a product from wishlist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wishlist updated

  /orders:
    get:
      tags: [Orders]
      summary: List orders for current user or all orders for privileged users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order list
    post:
      tags: [Orders]
      summary: Alias of checkout endpoint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created

  /orders/checkout:
    post:
      tags: [Orders]
      summary: Checkout reservation into order for customer or guest session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created

  /orders/reservations/current:
    get:
      tags: [Orders]
      summary: Get current active reservation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservation summary or null

  /orders/reservations:
    post:
      tags: [Orders]
      summary: Reserve stock from current cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservation created

  /orders/reservations/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel reservation and release stock
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation canceled

  /orders/reservations/release-expired:
    post:
      tags: [Orders]
      summary: Release expired reservations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expired reservations released

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail

  /orders/{id}/invoice:
    get:
      tags: [Orders]
      summary: Get invoice payload
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice data

  /orders/{id}/tracking:
    get:
      tags: [Orders]
      summary: Get shipment tracking summary
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracking data

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order canceled

  /orders/{id}/return:
    post:
      tags: [Orders]
      summary: Request order return
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Return requested

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Advance order status in managed flow
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order updated

  /payments/methods:
    get:
      tags: [Payments]
      summary: List enabled payment methods
      responses:
        '200':
          description: Payment method list

  /payments:
    post:
      tags: [Payments]
      summary: Initiate payment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: Payment session created

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment detail

  /payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Refund payment fully or partially
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
      responses:
        '200':
          description: Payment refunded

  /payments/webhook/{gateway}:
    post:
      tags: [Payments]
      summary: Gateway webhook with HMAC signature and idempotency
      parameters:
        - in: path
          name: gateway
          required: true
          schema:
            type: string
        - in: header
          name: x-webhook-signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook processed

  /inventory/adjust:
    post:
      tags: [Inventory]
      summary: Manual inventory adjustment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustInventoryRequest'
      responses:
        '200':
          description: Inventory adjusted

  /inventory/transfer:
    post:
      tags: [Inventory]
      summary: Transfer available variant stock between warehouses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferInventoryRequest'
      responses:
        '200':
          description: Inventory transferred

  /inventory/movements/list:
    get:
      tags: [Inventory]
