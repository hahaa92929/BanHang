openapi: 3.0.3
info:
  title: BanHang Backend API
  version: 2.0.0
  description: Versioned NestJS backend API for auth, catalog, cart, orders, payments, inventory, shipping, notifications, and reporting.
servers:
  - url: http://localhost:4000/api/v1
tags:
  - name: Health
  - name: Auth
  - name: Catalog
  - name: Cart
  - name: Orders
  - name: Payments
  - name: Inventory
  - name: Shipping
  - name: Notifications
  - name: Reporting
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Auth payload with debug verification token outside production

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed auth payload

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset requested

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified

  /auth/request-email-verification:
    post:
      tags: [Auth]
      summary: Request a new email verification token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification token requested

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List refresh sessions for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a refresh session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session revoked

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke a refresh token or all current user sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logout success

  /products:
    get:
      tags: [Catalog]
      summary: List active products with filters
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [price_asc, price_desc, rating_desc, newest, featured]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Product list
    post:
      tags: [Catalog]
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /products/export:
    get:
      tags: [Catalog]
      summary: Export products for admin workflows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Export payload

  /products/import:
    post:
      tags: [Catalog]
      summary: Bulk import products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportProductsRequest'
      responses:
        '200':
          description: Import result

  /products/categories:
    get:
      tags: [Catalog]
      summary: List category tree
      responses:
        '200':
          description: Category tree
    post:
      tags: [Catalog]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created

  /products/brands:
    get:
      tags: [Catalog]
      summary: List active brands
      responses:
        '200':
          description: Brand list
    post:
      tags: [Catalog]
      summary: Create brand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrandRequest'
      responses:
        '201':
          description: Brand created

  /products/{productRef}:
    get:
      tags: [Catalog]
      summary: Get product by id or slug
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
    patch:
      tags: [Catalog]
      summary: Update product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Catalog]
      summary: Archive product by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product archived

  /products/{productRef}/media:
    post:
      tags: [Catalog]
      summary: Add media to a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productRef
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductMediaRequest'
      responses:
        '201':
          description: Media created

  /cart:
    get:
      tags: [Cart]
      summary: Get current user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart summary

  /cart/items:
    post:
      tags: [Cart]
      summary: Add cart item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart

  /cart/items/{productId}:
    patch:
      tags: [Cart]
      summary: Set cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Updated cart
    delete:
      tags: [Cart]
      summary: Remove cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated cart

  /cart/merge:
    post:
      tags: [Cart]
      summary: Merge anonymous cart items into current user cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeCartRequest'
      responses:
        '200':
          description: Updated cart

  /cart/coupon:
    post:
      tags: [Cart]
      summary: Apply coupon to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCouponRequest'
      responses:
        '200':
          description: Updated cart
    delete:
      tags: [Cart]
      summary: Remove coupon from cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated cart

  /cart/save-for-later/{productId}:
    post:
      tags: [Cart]
      summary: Move cart item to wishlist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated cart

  /cart/clear:
    delete:
      tags: [Cart]
      summary: Clear cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Empty cart

  /orders:
    get:
      tags: [Orders]
      summary: List orders for current user or all orders for privileged users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order list
    post:
      tags: [Orders]
      summary: Alias of checkout endpoint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created

  /orders/checkout:
    post:
      tags: [Orders]
      summary: Checkout reservation into order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created

  /orders/reservations/current:
    get:
      tags: [Orders]
      summary: Get current active reservation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservation summary or null

  /orders/reservations:
    post:
      tags: [Orders]
      summary: Reserve stock from current cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservation created

  /orders/reservations/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel reservation and release stock
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation canceled

  /orders/reservations/release-expired:
    post:
      tags: [Orders]
      summary: Release expired reservations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expired reservations released

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail

  /orders/{id}/invoice:
    get:
      tags: [Orders]
      summary: Get invoice payload
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice data

  /orders/{id}/tracking:
    get:
      tags: [Orders]
      summary: Get shipment tracking summary
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracking data

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order canceled

  /orders/{id}/return:
    post:
      tags: [Orders]
      summary: Request order return
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Return requested

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Advance order status in managed flow
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order updated

  /payments/methods:
    get:
      tags: [Payments]
      summary: List enabled payment methods
      responses:
        '200':
          description: Payment method list

  /payments:
    post:
      tags: [Payments]
      summary: Initiate payment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '200':
          description: Payment session created

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment detail

  /payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Refund payment fully or partially
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
      responses:
        '200':
          description: Payment refunded

  /payments/webhook/{gateway}:
    post:
      tags: [Payments]
      summary: Gateway webhook with HMAC signature and idempotency
      parameters:
        - in: path
          name: gateway
          required: true
          schema:
            type: string
        - in: header
          name: x-webhook-signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook processed

  /inventory/adjust:
    post:
      tags: [Inventory]
      summary: Manual inventory adjustment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustInventoryRequest'
      responses:
        '200':
          description: Inventory adjusted

  /inventory/movements/list:
    get:
      tags: [Inventory]
      summary: List inventory movements
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory movement list

  /inventory/low-stock/list:
    get:
      tags: [Inventory]
      summary: List low stock products
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Low stock list

  /inventory/{sku}:
    get:
      tags: [Inventory]
      summary: Check inventory by SKU
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inventory status

  /shipping/calculate:
    post:
      tags: [Shipping]
      summary: Calculate shipping fee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateShippingRequest'
      responses:
        '200':
          description: Shipping quote

  /shipping/create:
    post:
      tags: [Shipping]
      summary: Create shipment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '200':
          description: Shipment created

  /shipping/zones/list:
    get:
      tags: [Shipping]
      summary: List delivery zones
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Zone list

  /shipping/{id}/tracking:
    get:
      tags: [Shipping]
      summary: Get shipment tracking info
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracking info

  /shipping/{id}/label:
    post:
      tags: [Shipping]
      summary: Generate shipment label
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Label generated

  /notifications:
    get:
      tags: [Notifications]
      summary: List current user notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification list

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notification updated

  /notifications/read/all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notifications updated

  /reporting/summary:
    get:
      tags: [Reporting]
      summary: Summary dashboard metrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reporting summary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    RegisterRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 8
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 40
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 40
        password:
          type: string
          minLength: 8
    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 40
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        verificationRequired:
          type: boolean
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            fullName:
              type: string
            role:
              type: string
            phone:
              type: string
            emailVerifiedAt:
              type: string
              format: date-time
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parentId:
          type: string
        sortOrder:
          type: integer
    CreateBrandRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        website:
          type: string
    CreateProductRequest:
      type: object
      required: [sku, name, description, price, stock]
      properties:
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: integer
        stock:
          type: integer
        categorySlug:
          type: string
        brandSlug:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, archived]
        isFeatured:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string
    UpdateProductRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProductRequest'
    ImportProductsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateProductRequest'
    AddProductMediaRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        altText:
          type: string
        type:
          type: string
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
    MergeCartRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddCartItemRequest'
    ApplyCouponRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    CheckoutRequest:
      type: object
      required: [reservationId, paymentMethod, shippingMethod]
      properties:
        reservationId:
          type: string
        addressId:
          type: string
        address:
          type: object
          required: [receiverName, phone, district, addressLine, country]
          properties:
            receiverName:
              type: string
            phone:
              type: string
            province:
              type: string
            district:
              type: string
            ward:
              type: string
            addressLine:
              type: string
            country:
              type: string
        saveAddress:
          type: boolean
        paymentMethod:
          type: string
          enum: [cod, vnpay, momo, zalopay, stripe, paypal, bank_transfer]
        shippingMethod:
          type: string
          enum: [standard, express, same_day, pickup]
        notes:
          type: string
    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, shipping, completed]
    InitiatePaymentRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
        method:
          type: string
          enum: [cod, vnpay, momo, zalopay, stripe, paypal, bank_transfer]
