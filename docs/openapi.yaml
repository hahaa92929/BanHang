components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        otp:
          type: string
          minLength: 6
        guestAccessToken:
          type: string
          minLength: 20
    RegisterRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 8
        guestAccessToken:
          type: string
          minLength: 20
        referralCode:
          type: string
          minLength: 4
    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 8
    RedeemLoyaltyRequest:
      type: object
      required: [points]
      properties:
        points:
          type: integer
          minimum: 500
    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8
        reason:
          type: string
          minLength: 3
    CreateAccountAddressRequest:
      type: object
      required: [fullName, phone, district, addressLine]
      properties:
        label:
          type: string
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 8
        province:
          type: string
        district:
          type: string
          minLength: 2
        ward:
          type: string
        addressLine:
          type: string
          minLength: 4
        country:
          type: string
        isDefault:
          type: boolean
    UpdateAccountAddressRequest:
      type: object
      properties:
        label:
          type: string
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 8
        province:
          type: string
        district:
          type: string
          minLength: 2
        ward:
          type: string
        addressLine:
          type: string
          minLength: 4
        country:
          type: string
        isDefault:
          type: boolean
    SocialLoginRequest:
      type: object
      required: [providerUserId, email]
      properties:
        providerUserId:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        phone:
          type: string
        guestAccessToken:
          type: string
          minLength: 20
        referralCode:
          type: string
          minLength: 4
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 40
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 40
        password:
          type: string
          minLength: 8
    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 40
    VerifyTwoFactorRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 64
        permissions:
          type: array
          items:
            type: string
            enum: [auth.manage, catalog.read, catalog.write, cart.write, orders.read, orders.manage, payments.manage, inventory.read, inventory.manage, shipping.manage, notifications.read, reporting.read]
        expiresAt:
          type: string
          format: date-time
    TwoFactorSetupResponse:
      type: object
      properties:
        success:
          type: boolean
        enabled:
          type: boolean
        secret:
          type: string
        otpauthUrl:
          type: string
        debug:
          type: object
          properties:
            currentCode:
              type: string
    ApiKeySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        permissions:
          type: array
          items:
            type: string
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    ApiKeyCreateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiKeySummary'
        - type: object
          properties:
            token:
              type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        csrfToken:
          type: string
        expiresIn:
          type: integer
        sessionId:
          type: string
        verificationRequired:
          type: boolean
        provider:
          type: string
        linkedAccount:
          type: boolean
        isNewAccount:
          type: boolean
        debug:
          type: object
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            fullName:
              type: string
            role:
              type: string
            phone:
              type: string
            referralCode:
              type: string
            emailVerifiedAt:
              type: string
              format: date-time
            twoFactorEnabledAt:
              type: string
              format: date-time
            lastLoginAt:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parentId:
          type: string
        sortOrder:
          type: integer
    CreateBrandRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        website:
          type: string
    CreateProductRequest:
      type: object
      required: [sku, name, description, price, stock]
      properties:
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: integer
        stock:
          type: integer
        categorySlug:
          type: string
        brandSlug:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, archived]
        isFeatured:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantRequest'
    UpdateProductRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProductRequest'
    ProductVariantWarehouseStockRequest:
      type: object
      required: [quantity]
      properties:
        warehouseCode:
          type: string
        quantity:
          type: integer
          minimum: 0
    ProductVariantRequest:
      type: object
      required: [sku, name]
      properties:
        sku:
          type: string
        name:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        price:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
        isDefault:
          type: boolean
        isActive:
          type: boolean
        warehouseStocks:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantWarehouseStockRequest'
    ImportProductsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateProductRequest'
    AddProductMediaRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        altText:
          type: string
        type:
          type: string
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
    CreateReviewRequest:
      type: object
      required: [rating, content]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
          maxLength: 120
        content:
          type: string
          minLength: 10
          maxLength: 2000
        mediaUrls:
          type: array
          items:
            type: string
    ReplyReviewRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 2
          maxLength: 1000
    ModerateReviewRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, published, rejected]
        adminReply:
          type: string
          minLength: 2
          maxLength: 1000
    CreateQuestionRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 8
          maxLength: 1000
    AnswerQuestionRequest:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          minLength: 2
          maxLength: 2000
    SetPriceAlertRequest:
      type: object
      properties:
        targetPrice:
          type: integer
          minimum: 0
    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        variantId:
          type: string
        quantity:
          type: integer
          minimum: 1
    AddWishlistItemRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
    CreateWishlistShareRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 120
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365
    AddCompareItemRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
    MergeCartRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddCartItemRequest'
    ApplyCouponRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    CheckoutRequest:
      type: object
      required: [reservationId, paymentMethod, shippingMethod]
      properties:
        reservationId:
          type: string
        addressId:
          type: string
        address:
          type: object
          required: [receiverName, phone, district, addressLine, country]
          properties:
            receiverName:
              type: string
            phone:
              type: string
            province:
              type: string
            district:
              type: string
            ward:
              type: string
            addressLine:
              type: string
            country:
              type: string
        saveAddress:
          type: boolean
        paymentMethod:
          type: string
          enum: [cod, vnpay, momo, zalopay, stripe, paypal, bank_transfer]
        shippingMethod:
          type: string
          enum: [standard, express, same_day, pickup]
        notes:
          type: string
    CreateOrderNoteRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 3
          maxLength: 2000
        visibility:
          type: string
          enum: [internal, customer]
    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, shipping, completed]
    InitiatePaymentRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
        method:
          type: string
          enum: [cod, vnpay, momo, zalopay, stripe, paypal, bank_transfer]
        savedPaymentMethodId:
          type: string
        returnUrl:
          type: string
          format: uri
        ipAddress:
          type: string
        locale:
          type: string
    CreateSavedPaymentMethodRequest:
